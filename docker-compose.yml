version: "3.9"

services:
  bot:
    build: .
    container_name: finance_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data          # SQLite файл
      - ./bot.log:/app/bot.log
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bot_net

  redis:
    image: redis:7-alpine
    container_name: finance_bot_redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bot_net

volumes:
  redis_data:

networks:
  bot_net:
    driver: bridge
